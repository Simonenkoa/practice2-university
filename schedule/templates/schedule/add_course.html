{% extends 'schedule/base.html' %}

{% block title %}Добавить курс{% endblock %}

{% block content %}
    <h2>Добавить новый курс</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить курс</button>
    </form>
    <br>
    <a href="{% url 'course_list' %}">← Вернуться к списку курсов</a>
{% endblock %}
