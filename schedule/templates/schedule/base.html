<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Университет{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #007bff; color: white; padding: 15px; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        main { padding: 20px; }
        footer { background: #333; color: white; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <header>
        <h1>Учебное расписание</h1>
        <nav>
            <a href="{% url 'teacher_list' %}">Список преподавателей</a>
            <a href="{% url 'course_list' %}">Список курсов</a>
            <a href="{% url 'add_teacher' %}">Добавить преподавателя</a>
            <a href="{% url 'add_course' %}">Добавить курс</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        &copy; 2026 Университет
    </footer>
</body>
</html>
