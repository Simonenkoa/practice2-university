<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Учебное расписание{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #007bff; color: white; padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-size: 18px; }
        nav a:hover { text-decoration: underline; }
        main { padding: 20px; }
        footer { background: #333; color: white; text-align: center; padding: 10px; margin-top: 30px; }
    </style>
</head>
<body>
    <header>
        <h1>Учебное расписание</h1>
        <nav>
            <a href="{% url 'teacher_list' %}">Список преподавателей</a>
            <a href="{% url 'course_list' %}">Список курсов</a>
            <a href="{% url 'student_list' %}">Список студентов</a>
            <a href="{% url 'orm_page' %}">ORM-запросы</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        &copy; 2026 Практическая работа 2
    </footer>
</body>
</html>
